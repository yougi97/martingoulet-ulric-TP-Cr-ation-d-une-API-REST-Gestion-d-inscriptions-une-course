version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: race_postgres
    restart: always
    environment:
      POSTGRES_USER: race
      POSTGRES_PASSWORD: race
      POSTGRES_DB: race_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/race-app/data
    networks:
      - race-network

  adminer:
    image: adminer
    container_name: race_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - race-network

volumes:
  postgres_data:

networks:
  race-network: